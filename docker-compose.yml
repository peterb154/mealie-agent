services:
  db:
    build:
      context: ./db
    environment:
      POSTGRES_USER: strands
      POSTGRES_PASSWORD: strands
      POSTGRES_DB: strands
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strands -d strands"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  agent:
    build:
      context: .
      args:
        # Stamp the current git SHA into the image so /api/health can report it
        # and n8n's deploy workflow can verify the new commit actually landed.
        GIT_SHA: ${GIT_SHA:-dev}
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      STRANDS_PG_DSN: postgresql://strands:strands@db:5432/strands
      DEPLOY_TRIGGER: /opt/mealie-agent/.deploy-trigger
    volumes:
      # Mount the host's repo checkout so /api/deploy can touch the
      # trigger file there. A host-side systemd path unit watches for
      # changes and handles git pull + rebuild. No docker.sock needed.
      - .:/opt/mealie-agent
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Uncomment if your agent has a browser tool (Playwright/CDP driving). Used
  # for scraping or automating websites your domain tools need to reach.
  # The agent talks to chromium over CDP at http://chromium:3000 — point your
  # Playwright connect() at ws://chromium:3000 or http://chromium:3000 per
  # browserless's docs. ~1.5GB image; skip this block if you don't need it.
  # chromium:
  #   image: browserless/chrome:latest
  #   environment:
  #     CONNECTION_TIMEOUT: "60000"
  #     MAX_CONCURRENT_SESSIONS: "3"
  #   shm_size: 2gb
  #   restart: unless-stopped

  # Uncomment to expose the domain schema as a REST API (PostgREST).
  # Requires a role migration granting SELECT to web_anon on your tables;
  # see https://github.com/peterb154/strands-pgsql-agent-framework for the
  # pattern.
  # postgrest:
  #   image: postgrest/postgrest:v12.2.0
  #   depends_on:
  #     db:
  #       condition: service_healthy
  #   environment:
  #     PGRST_DB_URI: postgres://strands:strands@db:5432/strands
  #     PGRST_DB_SCHEMAS: api
  #     PGRST_DB_EXTRA_SEARCH_PATH: "api, public"
  #     PGRST_DB_ANON_ROLE: web_anon
  #   ports:
  #     - "3000:3000"
  #   restart: unless-stopped

volumes:
  pgdata:
